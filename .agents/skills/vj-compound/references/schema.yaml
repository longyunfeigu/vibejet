# Documentation schema for learnings written by vj-compound.
# Treat this as the canonical frontmatter contract for docs/solutions/.
# vj-learnings-researcher reads against this same contract.
#
# The schema has two tracks based on problem_type:
#   Bug track       — problem_type is a defect or failure (build_error, test_failure, ...)
#   Knowledge track — problem_type is guidance or practice (best_practice, workflow_issue, ...)
#
# Both tracks share the same required core fields. The tracks differ in which
# additional fields are required vs optional (see track_rules below).

# --- Track classification ---------------------------------------------------
tracks:
  bug:
    description: "Defects, failures, and errors that were diagnosed and fixed"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Practices, patterns, conventions, decisions, workflow improvements, and documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention

# --- Fields required by BOTH tracks -----------------------------------------
required_fields:
  module:
    type: string
    description: "Module or area affected (e.g. conversation, file_asset, material, exam, attempt, auth)"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention
    description: "Primary category — determines track (bug vs knowledge). Prefer the narrowest applicable value; best_practice is the fallback when no narrower knowledge-track value fits."

  component:
    type: enum
    # Adapted to this repo's stack: DDD/hexagonal Python backend + React/TS frontend.
    values:
      - domain_entity
      - domain_service
      - repository
      - application_service
      - port_adapter
      - api_route
      - middleware
      - infrastructure_external   # llm / storage / messaging / external clients
      - celery_task
      - database
      - migration
      - llm_integration
      - idempotency
      - auth
      - config
      - frontend_feature
      - frontend_route
      - frontend_component
      - testing
      - documentation
      - tooling
      - development_workflow
    description: "Component involved"

  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
    description: "Impact severity"

# --- Track-specific rules ----------------------------------------------------
track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
        description: "Observable symptoms such as errors or broken behavior"
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Fundamental technical cause of the problem"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update
        description: "Type of fix applied"

  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
        description: "Conditions or situations where this guidance applies"
      symptoms:
        type: array[string]
        max_items: 5
        description: "Observable gaps or friction that prompted this guidance (optional for knowledge track)"
      root_cause:
        type: enum
        values:
          - missing_association
          - missing_include
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Underlying cause, if there is a specific one (optional for knowledge track)"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
          - seed_data_update
        description: "Type of change, if applicable (optional for knowledge track)"

# --- Fields optional for BOTH tracks ----------------------------------------
optional_fields:
  related_components:
    type: array[string]
    description: "Other components involved"

  tags:
    type: array[string]
    max_items: 8
    description: "Search keywords, lowercase and hyphen-separated"

# --- Validation rules --------------------------------------------------------
validation_rules:
  - "Determine track from problem_type using the tracks section above"
  - "All shared required_fields must be present"
  - "Bug-track required fields (symptoms, root_cause, resolution_type) must be present on bug-track docs"
  - "Knowledge-track docs have no additional required fields beyond the shared ones"
  - "Enum fields must match allowed values exactly"
  - "Array fields must respect min_items/max_items when specified"
  - "date must match YYYY-MM-DD format"
  - "tags should be lowercase and hyphen-separated"
  - "Array-of-strings items (symptoms, applies_when, tags, related_components) must be wrapped in double quotes when the value starts with a YAML reserved indicator (`, [, *, &, !, |, >, %, @, ?) or contains the substring `: ` — otherwise strict YAML parsers reject the file"
