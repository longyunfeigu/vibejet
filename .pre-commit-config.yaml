# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
          - --extend-ignore=E203,E501,W503
          - --exclude=backend/alembic/versions/*,backend/grpc_app/generated/*
          # 与 backend/.flake8 保持一致（pre-commit 从仓库根运行，读不到该文件）：
          # __init__ 豁免 F401；scripts/ 与 alembic/env.py 属 CLI/迁移工具，print 合法，豁免 T20
          - --per-file-ignores=*__init__.py:F401 *backend/scripts/*.py:T201,T203 *backend/alembic/env.py:T201,T203
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify
          - flake8-print

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --warn-unused-ignores
          - --exclude=backend/alembic/versions/.*\.py$
          - --exclude=backend/grpc_app/generated/.*\.py$
        additional_dependencies:
          - types-redis
          - types-aiofiles
          - sqlalchemy[mypy]
          - pydantic

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, backend/pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|backend/alembic/versions/.*)$
      - id: end-of-file-fixer
        exclude: ^(backend/alembic/versions/.*)$
      - id: check-yaml
        exclude: ^(.github/.*|docker-compose.*)$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python upgrade syntax
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, markdown]
        exclude: ^(CLAUDE\.md|AGENTS\.md|backend/alembic/versions/.*)$

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013]

  # Local: DDD 依赖方向契约（import 图必须全量检查，不适用 changed-files）。
  # 契约本体在 backend/pyproject.toml，改契约同样要触发检查。
  # --no-sync：避免每次 commit 触发依赖同步/网络请求（环境由 uv sync --extra dev 预先建好）
  - repo: local
    hooks:
      - id: lint-imports
        name: import-linter (DDD dependency direction)
        entry: bash -c 'cd backend && uv run --no-sync lint-imports'
        language: system
        files: ^backend/(.*\.py|pyproject\.toml)$
        pass_filenames: false

  # Local: validate PO files syntax (i18n)
  - repo: local
    hooks:
      - id: validate-po-syntax
        name: Validate .po files syntax
        entry: python backend/scripts/validate_po.py
        language: system
        pass_filenames: false
        stages: [commit]

# Configuration for specific runs
default_language_version:
  python: python3.11

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy]  # Skip mypy in CI (too slow). TODO: consider --incremental instead of full skip
  submodules: false
